.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.5) 0%,
    rgba(0,0,0,0.1) 30%,
    rgba(0,0,0,0.1) 60%,
    rgba(0,0,0,0.85) 100%
  );
  z-index: 1;
}

.app {
  position: relative;
  z-index: 2;
  max-width: 430px;
  margin: 0 auto;
  padding: 0 0 3rem;
  min-height: 100vh;
}

/* HEADER */
.header {
  padding: 3.5rem 1.5rem 1rem;
  text-align: center;
}

.header-eyebrow {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 0.5rem;
}

.header-title {
  font-family: "Bebas Neue", sans-serif;
  font-size: 58px;
  line-height: 0.95;
  color: #fff;
  letter-spacing: 2px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.8);
}

.header-title span {
  color: #e8e8e8;
  display: block;
  font-size: 32px;
  letter-spacing: 4px;
  opacity: 0.7;
}

.verse {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 0.5rem;
}

/* BIG COUNTER */
.counter-section {
  text-align: center;
  padding: 1.5rem 1.5rem 1rem;
}

.counter-num {
  font-family: "Bebas Neue", sans-serif;
  font-size: 110px;
  line-height: 1;
  color: #fff;
  text-shadow: 0 0 60px rgba(255,255,255,0.15);
  letter-spacing: 4px;
}

.counter-label {
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-top: -8px;
}

.total-pushups {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-top: 0.75rem;
  letter-spacing: 1px;
}

.total-pushups strong {
  color: #fff;
  font-weight: 600;
}

/* QUOTE */
.quote-section {
  margin: 0.5rem 1.5rem 1.5rem;
  padding: 1rem 1.25rem;
  border-left: 2px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  border-radius: 0 8px 8px 0;
}

.quote-text {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  font-style: italic;
  line-height: 1.6;
}

.quote-author {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 6px;
  letter-spacing: 0.5px;
}

/* TODAY CARD */
.today-card {
  margin: 0 1.5rem 1rem;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 1.25rem;
}

.today-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-bottom: 1rem;
}

.move-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.875rem 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
}

.move-row:last-of-type { border-bottom: none; }
.move-row:active { opacity: 0.7; }

.move-left {}

.move-name {
  font-size: 16px;
  font-weight: 500;
  color: #fff;
}

.move-detail {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

.move-check {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
}

.move-row.ticked .move-check {
  background: #fff;
  border-color: #fff;
}

.move-row.ticked .move-name {
  opacity: 0.5;
  text-decoration: line-through;
  text-decoration-color: rgba(255,255,255,0.3);
}

.check-svg { display: none; }
.move-row.ticked .check-svg { display: block; }

/* LOG BUTTON */
.log-btn {
  display: block;
  width: calc(100% - 3rem);
  margin: 0 1.5rem 1.5rem;
  padding: 1.1rem;
  background: #fff;
  color: #0a0a0a;
  border: none;
  border-radius: 12px;
  font-family: "Bebas Neue", sans-serif;
  font-size: 24px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.log-btn:disabled {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.2);
  cursor: default;
}

.log-btn.done {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  border: 0.5px solid rgba(255,255,255,0.15);
  font-size: 16px;
  letter-spacing: 1px;
  font-family: "DM Sans", sans-serif;
  font-weight: 500;
}

.log-btn:not(:disabled):not(.done):active { transform: scale(0.98); }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin: 0 1.5rem 1.5rem;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 0.875rem 0.5rem;
  text-align: center;
}

.stat-val {
  font-family: "Bebas Neue", sans-serif;
  font-size: 28px;
  color: #fff;
  line-height: 1;
}

.stat-lbl {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* HISTORY */
.history-section {
  margin: 0 1.5rem;
}

.section-label {
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 0.75rem;
}

.history-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.history-dot {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: rgba(255,255,255,0.2);
}

.history-dot.done {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
}

.history-dot.today {
  border: 1.5px solid rgba(255,255,255,0.6);
  color: rgba(255,255,255,0.6);
}

/* FLASH */
@keyframes flash {
  0% { opacity: 0; }
  20% { opacity: 1; }
  100% { opacity: 0; }
}
.flash {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.08);
  pointer-events: none;
  animation: flash 0.8s ease forwards;
  z-index: 99;
}

.reset-btn {
  display: block;
  margin: 2rem auto 0;
  background: none;
  border: none;
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  cursor: pointer;
  text-decoration: underline;
  font-family: "DM Sans", sans-serif;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="app">
  <div class="header">
    <div class="header-eyebrow">Daily discipline</div>
    <div class="header-title">
      100
      <span>EVERY DAY</span>
    </div>
    <div class="verse">Romans 5:3-4</div>
  </div>

  <div class="counter-section">
    <div class="counter-num" id="streak-num">0</div>
    <div class="counter-label">Consecutive Days</div>
    <div class="total-pushups">Total push-ups: <strong id="total-pushups">0</strong></div>
  </div>

  <div class="quote-section">
    <div class="quote-text" id="quote-text"></div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <div class="today-card">
    <div class="today-label">Today's mission</div>
    <div class="move-row" id="m0" onclick="toggleMove(0)">
      <div class="move-left">
        <div class="move-name">Push-ups</div>
        <div class="move-detail">100 reps</div>
      </div>
      <div class="move-check">
        <svg class="check-svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7L5.5 10.5L12 3.5" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <button class="log-btn" id="log-btn" onclick="logDay()" disabled>Log Today</button>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="s-streak">0</div>
      <div class="stat-lbl">Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-total">0</div>
      <div class="stat-lbl">Total Days</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-pushups">0</div>
      <div class="stat-lbl">Push-ups</div>
    </div>
  </div>

  <div class="history-section">
    <div class="section-label">History</div>
    <div class="history-grid" id="history-grid"></div>
  </div>

  <button class="reset-btn" onclick="resetAll()">Reset all progress</button>
</div>

<script>
const QUOTES = [
  { text: "We rejoice in our sufferings, knowing that suffering produces endurance, and endurance produces character, and character produces hope.", author: "Romans 5:3-4" },
  { text: "No one is going to come and save you. No one is coming to push you. This is yours.", author: "David Goggins" },
  { text: "Discipline equals freedom.", author: "Jocko Willink" },
  { text: "Do not pray for an easy life. Pray for the strength to endure a difficult one.", author: "Bruce Lee" },
  { text: "Suffer the pain of discipline or suffer the pain of regret.", author: "Jim Rohn" },
  { text: "You have power over your mind, not outside events. Realise this, and you will find strength.", author: "Marcus Aurelius" },
  { text: "Get comfortable being uncomfortable. That's how you grow.", author: "David Goggins" },
  { text: "There is no easy way. There is only hard work, late nights, and the willingness to fail.", author: "Jocko Willink" },
  { text: "The obstacle is the way.", author: "Marcus Aurelius" },
  { text: "We suffer more in imagination than in reality.", author: "Seneca" },
  { text: "There is nothing outside of yourself that can ever enable you to get better. Everything is within.", author: "Miyamoto Musashi" },
  { text: "The mind is the most powerful weapon. If you can control your mind, you can do anything.", author: "David Goggins" },
  { text: "Today I will do what others won't, so tomorrow I can do what others can't.", author: "Jocko Willink" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aurelius" },
  { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca" },
  { text: "You must do the thing you think you cannot do.", author: "Eleanor Roosevelt" },
  { text: "Fall down seven times, get up eight.", author: "Japanese proverb" },
  { text: "The successful warrior is the average man with laser-like focus.", author: "Bruce Lee" },
  { text: "Do today what others won't so tomorrow you can do what others can't.", author: "Jerry Rice" },
  { text: "Stop waiting for the right moment. The moment is now.", author: "Jocko Willink" },
  { text: "Strength is produced by struggle.", author: "Henry Rollins" },
  { text: "You have to build calluses on your brain just like you build calluses on your hands.", author: "David Goggins" },
  { text: "Accept the challenges so that you can feel the exhilaration of victory.", author: "George S. Patton" },
  { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
  { text: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
  { text: "The man who moves a mountain begins by carrying away small stones.", author: "Confucius" },
  { text: "If you always put limits on what you can do, it will spread over into the rest of your life.", author: "Bruce Lee" },
  { text: "Today you earned it. Tomorrow you earn it again.", author: "Jocko Willink" },
  { text: "Do not go where the path may lead — go where there is no path and leave a trail.", author: "Ralph Waldo Emerson" },
  { text: "Earn it.", author: "Unknown" }
];

const KEY = "pushup_daily_v1";
let state = { days: [], moves: [false], startDate: null };

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) state = JSON.parse(r);
    if (!state.moves) state.moves = [false];
    if (!state.days) state.days = [];
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function getStreak() {
  if (state.days.length === 0) return 0;
  const sorted = [...state.days].sort().reverse();
  const today = todayStr();
  const yesterday = offsetDate(-1);
  if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
  let streak = 0;
  let check = sorted[0] === today ? today : yesterday;
  for (let i = 0; i < sorted.length; i++) {
    if (sorted[i] === check) {
      streak++;
      check = offsetDate(-1, check);
    } else break;
  }
  return streak;
}

function offsetDate(days, fromStr) {
  const d = fromStr ? new Date(fromStr + "T00:00:00") : new Date();
  d.setDate(d.getDate() + days);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function toggleMove(i) {
  const today = todayStr();
  if (state.days.includes(today)) return;
  state.moves[i] = !state.moves[i];
  save(); render();
}

function logDay() {
  const today = todayStr();
  if (state.days.includes(today)) return;
  if (!state.moves.every(Boolean)) return;
  state.days.push(today);
  state.moves = [false];
  save(); render();
  const flash = document.createElement("div");
  flash.className = "flash";
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 900);
}

function resetAll() {
  if (confirm("Reset all progress? This cannot be undone.")) {
    state = { days: [], moves: [false] };
    save(); render();
  }
}

function render() {
  const today = todayStr();
  const todayDone = state.days.includes(today);
  const streak = getStreak();
  const total = state.days.length;

  document.getElementById("streak-num").textContent = streak;
  document.getElementById("total-pushups").textContent = (total * 100).toLocaleString();
  document.getElementById("s-streak").textContent = streak;
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-pushups").textContent = total >= 1000 ? Math.floor(total/10)/100 + "k" : (total * 100).toLocaleString();

  // Quote — rotate by day of year
  const doy = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const q = QUOTES[doy % QUOTES.length];
  document.getElementById("quote-text").textContent = "\u201c" + q.text + "\u201d";
  document.getElementById("quote-author").textContent = "\u2014 " + q.author;

  // Move rows
  const m0 = document.getElementById("m0");
  if (todayDone || state.moves[0]) m0.classList.add("ticked");
  else m0.classList.remove("ticked");

  // Button
  const btn = document.getElementById("log-btn");
  if (todayDone) {
    btn.textContent = "Done. Come back tomorrow.";
    btn.className = "log-btn done";
    btn.disabled = false;
  } else if (state.moves.every(Boolean)) {
    btn.textContent = "Log Today";
    btn.className = "log-btn";
    btn.disabled = false;
  } else {
    btn.textContent = "Log Today";
    btn.className = "log-btn";
    btn.disabled = true;
  }

  // History grid — show last 60 days
  const grid = document.getElementById("history-grid");
  grid.innerHTML = "";
  for (let i = 59; i >= 0; i--) {
    const dateStr = offsetDate(-i);
    const el = document.createElement("div");
    let cls = "history-dot";
    if (dateStr === today) cls += " today";
    else if (state.days.includes(dateStr)) cls += " done";
    el.className = cls;
    const d = new Date(dateStr + "T00:00:00");
    el.textContent = d.getDate();
    grid.appendChild(el);
  }
}

load();
render();
</script>
</body>
</html>
